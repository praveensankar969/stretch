name: Deploy website to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - "src/assets/**"
      - "src/shared/**"
      - "src/vendor/**"
      - "Stretch-1.0.0.exe"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage site (website + referenced src assets)
        run: |
          mkdir -p _site/src
          cp -r website/. _site/
          cp -r src/assets _site/src/assets
          cp -r src/shared _site/src/shared
          cp -r src/vendor _site/src/vendor
          cp Stretch-1.0.0.exe _site/Stretch-1.0.0.exe
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - id: deploy
        uses: actions/deploy-pages@v4