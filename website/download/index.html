<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5efe6;
      --fg: #17130f;
      --muted: #6f6252;
      --accent: #d9734a;
      --card: #fffaf1;
      --line: rgba(23, 19, 15, 0.14);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #17130f;
        --fg: #f5efe6;
        --muted: #cdbda8;
        --card: #211a14;
        --line: rgba(245, 239, 230, 0.16);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(100%, 520px);
      padding: clamp(28px, 6vw, 48px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
    }

    .mark {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.6rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
      font-weight: 500;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    a {
      color: var(--fg);
      text-decoration-color: var(--accent);
      text-underline-offset: 3px;
    }

    .button {
      display: inline-flex;
      margin-top: 28px;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 20px;
      background: var(--fg);
      color: var(--bg);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
